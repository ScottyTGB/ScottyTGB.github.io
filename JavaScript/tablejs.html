<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table JS</title>
  </head>
  <body>
    <form action="">
      <label for="name">Name (includes data validation)</label>
      <input type="text" name="" id="name" /><br /><br />
      <label for="age">Age</label>
      <input type="text" name="" id="age" /><br /><br />
      <button type="button" onclick="adddata()">Add Data</button>
    </form>
    <table border="1" cellspacing="0" cellpadding="15">
      <thead>
        <th>No.</th>
        <th>Name</th>
        <th>Age</th>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <script>
      var data = [];
      console.log(data);
      function adddata() {
        let newdata = {
          name: document.getElementById("name").value,
          age: document.getElementById("age").value,
        };

        if (data.findIndex((x) => x.name === newdata.name) >= 0) {
          alert(`The name "${newdata.name}" already exists, please try again.`);
        } else if (newdata.name === "") {
          alert("The name you entered is blank, please try again.");
        } else if (newdata.age === "") {
          alert("The age you entered is blank, please try again.");
        } else {
          data.push(newdata);
        }
        let tbody = document.querySelector("#tbody");
        let mydata = "";
        let i = 1;

        for (const value of data) {
          mydata += `<tr>
                        <td>${i}</td>
                        <td>${value.name}</td>
                        <td>${value.age}</td>
                    </tr>`;
          i++;
        }
        console.log(data);
        function showdata() {}
        tbody.innerHTML = mydata;
      }
    </script>
  </body>
</html>
