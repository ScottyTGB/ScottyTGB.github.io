<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guessing Game</title>
  </head>
  <body>
    <script>
      let secret = 5;
      let guess = prompt("Guess a number between 1 to 10");
      guess = Number(guess);

      while (guess != secret) {
        if (guess > secret) {
          alert("Your number is higher, guess again.");
          let guess = prompt("Guess a number between 1 to 10, again.");
          guess = Number(guess);
        } else {
          alert("Your number is lower, guess again.");
          let guess = prompt("Guess a number between 1 to 10, again.");
          guess = Number(guess);
        }
      }
      alert("You guessed it!");
    </script>
  </body>
</html>
