<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Append Child</title>
    <script>
      function adding() {
        let ul = document.getElementById("list");
        let list_data = document.getElementById("names").value;
        console.log(list);
        let li = document.createElement("li");
        li.innerHTML = list_data;
        ul.appendChild(li);
      }
    </script>
  </head>
  <body>
    <input type="text" name="name" id="names" />
    <br /><br />
    <button onclick="adding()" type="button">Add</button><br />
    <ul id="list"></ul>
  </body>
</html>
