<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS 1</title>
  </head>
  <body>
    <script>
      // Syntax
      var name = "Scotty"; // String
      console.log(typeof name);
      var Name = ";s"; // String
      console.log(typeof Name);
      var age = 16; // Number
      console.log(typeof age);
      var job = "Student"; // String
      console.log(typeof job);
      var salary = "0"; // Number
      console.log(typeof salary);
      var js = true; // Boolean
      console.log(typeof js);
      var docker = false; // Boolean
      console.log(typeof docker);
      var array = ["Travelling", "Reading", "Coding? ;s"]; // Array
      console.log(typeof array);
      var interests = { color: "red", fruit: "banana", car: "Tesla" }; // Object
      console.log(typeof interests);

      // Variables
      var a = 13;
      let b = 23;
      const c = 33;
      const pi = 22 / 7;

      var num1 = 50;
      var num1 = 60;
      console.log(num1);
      num1 = 55;
      console.log(num1);

      let x = 100;
      console.log(x);
      x = 200;
      console.log(x);
      function show() {
        var number1 = 2;
        let number2 = 3;
      }
      show();
      console.log(number1 + 13);
    </script>
  </body>
</html>
